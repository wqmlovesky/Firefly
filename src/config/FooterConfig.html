<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义页脚内容</title>
    <style>
        /* 页脚整体容器 */
        .badge-footer {
            display: flex;
            flex-direction: column;
            padding: 10px 0;
            font-size: 14px;
            color: #666;
        }

        /* 动物图片 水平居中 */
        .animal-img {
            display: flex;
            justify-content: center;
        }

        /* 徽章组：横向同一行展示 */
        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
            align-items: center;
            justify-content: center;
        }

        /* 文字信息行 水平居中 */
        .footer-info {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
            font-size: 13px;
            color: #888;
            line-height: 1.8;
        }

        /* 链接样式 */
        .footer-info a {
            color: #888;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .footer-info a:hover {
            color: #409eff;
        }

        /* 统计小图标 */
        .footer-info img {
            width: 16px;
            height: 16px;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div class="badge-footer">
        <!-- 第一行：居中的动物图片 -->
        <div class="animal-img">
            <img alt="VitePress" src="/assets/images/animals.webp">
        </div>

        <!-- 第二行：所有徽章 -->
        <div class="badge-group">
            <a target="_blank" href="https://astro.build/" title="本站使用 Astro构建服务 Vite"><img alt="Astro"
                    src="https://img.shields.io/badge/Build-Astro-%23BC52EE?logo=astro&logoColor=%23BC52EE"></a>

            <a target="_blank" href="https://tailwindcss.com/" title="本CSS基于 TailwindCSS_v4.2"><img alt="TailwindCSS"
                    src="https://img.shields.io/badge/Tailwind-CSS-%2306B6D4?logo=tailwindcss&logoColor=%2306B6D4"></a>

            <a target="_blank" href="https://twikoo.js.org/" title="本站评论系统 Twikoo"><img alt="Twikoo"
                    src="https://img.shields.io/badge/Comments-Twikoo-%23007aff?logo=livechat&logoColor=%23007aff"></a>

            <a target="_blank" href="https://www.algolia.com/" title="本站搜索服务 Algolia"><img alt="Algolia"
                    src="https://img.shields.io/badge/Search-Algolia-%23003DFF?logo=algolia&logoColor=%23003DFF"></a>

            <a target="_blank" href="https://edgeone.ai/zh/" title="本站CDN加速 EdgeOne"><img alt="EdgeOne"
                    src="https://img.shields.io/badge/zsr-EdgeOne-blue?logo=icloud&label=CDN"></a>

            <a target="_blank" href="https://umami.is/" title="本站统计服务 Umami"><img alt="Umami"
                    src="https://img.shields.io/badge/umami-000000?logo=umami&label=Count&color=%23000000"></a>

            <a target="_blank" href="https://51.la/" title="本站统计服务 51.LA"><img alt="51.LA"
                    src="https://img.shields.io/badge/51.LA-000000?logo=51.LA&label=Count&color=%23FF6A00"></a>

            <a target="_blank" href="http://creativecommons.org/licenses/by-nc-sa/4.0/"
                title="本站内容采用 CC BY-NC-SA 4.0 许可"><img alt="Copyright"
                    src="https://img.shields.io/badge/Copyright-BY--NC--SA%204.0-d42328?logo=coursera&amp;logoColor=fff"></a>
        </div>

        <!-- 51.la 统计挂件 -->
        <div class="footer-info">
            <script id="LA-DATA-WIDGET" crossorigin="anonymous" charset="UTF-8"
                src="https://v6-widget.51.la/v6/3MQCwI1AgSSiVg37/quote.js?theme=#1690FF,#539DFD,#539DFD,#539DFD,#FFFFFF,#1690FF,12&f=12"></script>
        </div>

        <!-- 统计服务说明 -->
        <div class="footer-info">
            <a href="https://51.la/" target="_blank">
                <img src="https://v6.51.la/favicon.ico" alt="51.LA"> 51.LA
            </a>
            <a href="https://umami.is/" target="_blank">
                | <img src="https://umami.is/favicon.ico" alt="Umami"> Umami

        <!-- 运行时间 -->
        <div class="footer-info">
            <span id="runtime"></span>(●'◡'●)
        </div>

        <!-- 文案 + 版本 + 备案 -->
        <div class="footer-info">
            <span>人心中的成见是一座大山~</span>
            <span id="versionText">主题版本：v6.10.3</span>
            <a target="_blank" href="https://beian.mps.gov.cn/">甘公网安备62102702000211号</a>
        </div>
    </div>

    <!-- 版本号自动获取 -->
    <script>
        fetch('/package.json')
            .then(function(res) {
                if (!res.ok) {
                    throw new Error('HTTP ' + res.status);
                }
                return res.json();
            })
            .then(function(pkg) {
                document.getElementById('versionText').textContent = '主题版本：v' + pkg.version;
            })
            .catch(function(e) {
                // Silently fail - version is already shown as fallback
            });
    </script>

    <!-- ====================== 运行时间核心代码 ====================== -->
    <script>
        // 网站开始运行时间（请修改为你的网站上线时间）
        const START_TIME = "2026-04-28 00:00:00";

        // 运行时间函数
        function startRuntime() {
            const runtimeEl = document.getElementById('runtime');
            if (!runtimeEl) return;

            function update() {
                const start = new Date(START_TIME).getTime();
                const now = Date.now();
                const diff = now - start;

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                runtimeEl.innerHTML = `
                    小破站已运行
                    <span style="color:#FFA500">${days}</span>天
                    <span style="color:#1DBF97">${hours}</span>时
                    <span style="color:#8A2BE2">${minutes}</span>分
                    <span style="color:#007EC6">${seconds}</span>秒
                `;
            }

            update();
            setInterval(update, 1000);
        }

        // 启动运行时间
        startRuntime();
    </script>
</body>

</html>
